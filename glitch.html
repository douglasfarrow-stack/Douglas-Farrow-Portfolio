<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Glitch Art Gallery</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<style>
		body {
			background: linear-gradient(135deg, #f8f9fa 0%, #e9f3ff 100%);
			min-height: 100vh;
		}

		.gallery-wrap {
			max-width: 900px;
		}

		.gallery-image {
			cursor: zoom-in;
			border: 3px solid #111;
			box-shadow: 8px 8px 0 #111;
			transition: transform 0.2s ease;
		}

		.gallery-image:hover {
			transform: translateY(-3px);
		}
	</style>
</head>
<body>
	<nav class="navbar navbar-expand-lg bg-white border-bottom border-3 border-dark sticky-top">
		<div class="container">
			<a class="navbar-brand fw-bold" href="index.html">Douglas Farrow</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav" aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="siteNav">
				<ul class="navbar-nav ms-auto fw-semibold">
					<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
					<li class="nav-item"><a class="nav-link" href="index.html#logo">Logo</a></li>
					<li class="nav-item"><a class="nav-link" href="index.html#meme">Meme</a></li>
					<li class="nav-item"><a class="nav-link" href="index.html#work-3d">3D Work</a></li>
					<li class="nav-item"><a class="nav-link" href="index.html#net-art">Net Art</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<main class="container py-5">
		<section class="gallery-wrap mx-auto text-center">
			<h1 class="display-5 fw-bold mb-4">Glitch Art of a Cute Mouse.</h1>
			<div class="card border-dark border-3 shadow-sm">
				<div class="card-body p-4">
					<img
						src="mouseglitch.jpg"
						alt="Glitch art of a cute mouse"
						class="img-fluid rounded gallery-image"
						data-bs-toggle="modal"
						data-bs-target="#previewModal"
					>
					<p class="mt-4 mb-0 lead">
						A playful mouse portrait distorted with digital noise, color shifts, and broken signal textures.
					</p>
				</div>
			</div>
		</section>
	</main>

	<div class="modal fade" id="previewModal" tabindex="-1" aria-labelledby="previewModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered modal-xl">
			<div class="modal-content border-dark border-3">
				<div class="modal-header">
					<h2 class="modal-title fs-5" id="previewModalLabel">Mouse Glitch Preview</h2>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body text-center p-2 p-md-3">
					<img src="mouseglitch.jpg" alt="Large preview of glitch mouse artwork" class="img-fluid rounded">
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
